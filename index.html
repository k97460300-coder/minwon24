<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>警察厅 拾获物 实时仪表板</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loader" class="loader-wrapper">
        <div class="loader"></div>
    </div>

    <header>
        <div class="header-content">
            <h1 class="logo">Jeju <span>Dashboard</span></h1>
            <p class="subtitle">济州特别自治道 实时拾获物 现状分析</p>
            <div class="stats-glass">
                <div class="stat-item">
                    <span id="total-count" class="stat-value">0</span>
                    <span class="stat-label">拾获物总数</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span id="current-date-range" class="stat-value" style="font-size: 1.2rem;">-</span>
                    <span class="stat-label">查询日期</span>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="filter-bar">
            <h2>最近登记列表</h2>
            <div class="controls">
                <div class="view-switcher">
                    <button id="view-card" class="btn-view active">卡片视图</button>
                    <button id="view-table" class="btn-view">表格视图 (Excel)</button>
                </div>
                <button id="btn-export" class="btn-primary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    保存为 Excel (CSV)
                </button>
                <button id="btn-crawl" class="btn-secondary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"></path><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
                    同步数据
                </button>
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="搜索物品名称...">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </div>
            </div>
        </div>
        <div id="items-container">
            <div id="items-grid" class="items-grid"></div>
            <div id="items-table-wrapper" class="items-table-wrapper" style="display: none;">
                <table id="items-table" class="excel-table">
                    <thead>
                        <tr>
                            <th>序号</th>
                            <th>图片</th>
                            <th>物品名称</th>
                            <th>拾获日期</th>
                            <th>拾获地点</th>
                            <th>保管地点</th>
                            <th>状态</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
                <div class="table-actions">
                    <button class="btn-share" onclick="captureTable()">截图保存为 4:3 图片 (小红书/微信)</button>
                </div>
            </div>
        </div>
    </main>

    <div id="image-modal" class="modal-overlay" onclick="closeImageModal()">
        <div class="modal-content">
            <button class="close-btn" onclick="closeImageModal()">&times;</button>
            <img id="modal-img" src="" alt="Enlarged Image">
        </div>
    </div>

    <footer>
        <p>&copy; 2026 警察厅 拾获物 综合分析系统. All Rights Reserved.</p>
        <p class="disclaimer">本服务是基于公共数据进行可视化的仪表板。</p>
    </footer>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
